appId: com.opengis.desktop
productName: OpenGIS
directories:
  buildResources: resources
  output: dist

files:
  - "out/**/*"
  - "resources/icons/**/*"

extraResources:
  - from: "python-backend/"
    to: "python-backend/"
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/tests/**"
      - "!**/.venv"
      - "!**/.venv/**"
      - "!**/.egg-info"
      - "!**/.egg-info/**"
  - from: "resources/icons/"
    to: "icons/"
    filter:
      - "**/*"

win:
  target:
    - nsis
    - portable
  icon: resources/icons/app-icon.png
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target:
    - dmg
    - zip
  # 1254×1254 PNG，electron-builder 会在打包阶段自动转成 .icns。
  icon: resources/icons/app-icon.png
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  # 暂未配置代码签名 / 公证：未签名 .dmg 在 macOS 12+ 首次打开
  # 需用户右键→打开。正式发版前需补 identity + notarize。

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
  iconSize: 80
  iconTextSize: 12

linux:
  target:
    - AppImage
    - deb
  icon: resources/icons/app-icon.png
  category: Science
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
