  <body class="bg-bg-primary text-text-primary antialiased">
    <div id="root"></div>
    <script>
      // Prevent FOUC: apply theme before React renders
      // Default theme is 'system', so check OS preference
      (function() {
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (!prefersDark) document.documentElement.classList.add('light');
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
