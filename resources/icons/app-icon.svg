<!-- OpenGIS App Icon Placeholder -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12151c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Globe outline -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="url(#accent)" stroke-width="8" opacity="0.8"/>
  <ellipse cx="256" cy="240" rx="60" ry="120" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.5"/>
  <line x1="136" y1="240" x2="376" y2="240" stroke="url(#accent)" stroke-width="4" opacity="0.5"/>
  <line x1="256" y1="120" x2="256" y2="360" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>
  <!-- AI sparkle -->
  <circle cx="340" cy="170" r="6" fill="#3b82f6"/>
  <circle cx="340" cy="170" r="12" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <!-- Text -->
  <text x="256" y="430" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="48" fill="#e8eaed">
    OpenGIS
  </text>
</svg>
