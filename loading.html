<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenGIS - Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ─── Theme variables ─── */
    :root {
      --bg: #ffffff;
      --bg-card: #f8f9fb;
      --text: #1a1a2e;
      --text-sub: #8c8c9a;
      --text-dim: #b0b0be;
      --border: #e2e5ea;
      --step-bg: #f0f0f5;
      --step-border: #e2e2ec;
      --step-color: #c0c0cc;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.25);
      --success: #22c55e;
      --track: #f0f0f5;
      --orb-1: rgba(59, 130, 246, 0.6);
      --orb-2: rgba(99, 102, 241, 0.5);
      --orb-3: rgba(6, 182, 212, 0.4);
      --orb-4: rgba(34, 197, 94, 0.3);
    }
    .dark {
      --bg: #0a0c10;
      --bg-card: #12151c;
      --text: #e8eaed;
      --text-sub: #9aa0ad;
      --text-dim: #5f6573;
      --border: #1e2330;
      --step-bg: #1a1e2a;
      --step-border: #2a2f3d;
      --step-color: #5f6573;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.35);
      --success: #22c55e;
      --track: #1a1e2a;
      --orb-1: rgba(59, 130, 246, 0.7);
      --orb-2: rgba(99, 102, 241, 0.6);
      --orb-3: rgba(6, 182, 212, 0.5);
      --orb-4: rgba(34, 197, 94, 0.4);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .container {
      text-align: center;
      max-width: 420px;
      width: 100%;
      padding: 48px 32px;
    }

    /* ─── Siri-like orb animation ─── */
    .orb-wrapper {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .orb-canvas {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      filter: blur(16px);
      opacity: 0.85;
      animation: orb-rotate 6s ease-in-out infinite;
    }
    .orb-blob {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
    }
    .dark .orb-blob {
      mix-blend-mode: screen;
    }
    .orb-blob:nth-child(1) {
      width: 80%;
      height: 80%;
      top: 5%;
      left: 10%;
      background: radial-gradient(circle, var(--orb-1), transparent 70%);
      animation: orb-drift-1 4s ease-in-out infinite;
    }
    .orb-blob:nth-child(2) {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 20%;
      background: radial-gradient(circle, var(--orb-2), transparent 70%);
      animation: orb-drift-2 5s ease-in-out infinite;
    }
    .orb-blob:nth-child(3) {
      width: 65%;
      height: 65%;
      top: 20%;
      left: 5%;
      background: radial-gradient(circle, var(--orb-3), transparent 70%);
      animation: orb-drift-3 4.5s ease-in-out infinite;
    }
    .orb-blob:nth-child(4) {
      width: 60%;
      height: 60%;
      top: 10%;
      left: 28%;
      background: radial-gradient(circle, var(--orb-4), transparent 70%);
      animation: orb-drift-4 5.5s ease-in-out infinite;
    }
    .orb-center {
      position: relative;
      z-index: 2;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 32px var(--accent-glow);
    }
    .orb-center img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    @keyframes orb-rotate {
      0%, 100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(90deg) scale(1.08); }
      50% { transform: rotate(180deg) scale(0.92); }
      75% { transform: rotate(270deg) scale(1.05); }
    }
    @keyframes orb-drift-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(25%, -18%) scale(1.15); }
      66% { transform: translate(-18%, 25%) scale(0.85); }
    }
    @keyframes orb-drift-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-30%, 15%) scale(1.2); }
      66% { transform: translate(15%, -25%) scale(0.8); }
    }
    @keyframes orb-drift-3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(18%, 30%) scale(1.1); }
      66% { transform: translate(-25%, -18%) scale(0.9); }
    }
    @keyframes orb-drift-4 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-15%, -28%) scale(1.15); }
      66% { transform: translate(30%, 15%) scale(0.85); }
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      color: var(--text);
    }
    .subtitle {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 44px;
      font-weight: 400;
    }
    .steps { text-align: left; margin-bottom: 36px; }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      font-size: 13px;
      color: var(--text-dim);
      transition: color 0.35s ease;
    }
    .step.active { color: var(--text); font-weight: 500; }
    .step.done { color: var(--text-sub); }
    .step-icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.4s ease;
    }
    .step.pending .step-icon {
      background: var(--step-border);
    }
    .step.active .step-icon {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow), 0 0 3px var(--accent);
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    .step.done .step-icon {
      background: var(--accent);
      opacity: 0.6;
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }
    .progress-wrapper { margin-bottom: 16px; }
    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--track);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .status-text {
      font-size: 12px;
      color: var(--text-sub);
      min-height: 18px;
    }
    .footer {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11.5px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="orb-wrapper">
      <div class="orb-canvas">
        <div class="orb-blob"></div>
        <div class="orb-blob"></div>
        <div class="orb-blob"></div>
        <div class="orb-blob"></div>
      </div>
      <div class="orb-center">
        <img src="./logo.png" alt="OpenGIS">
      </div>
    </div>
    <div class="title">OpenGIS</div>
    <div class="subtitle">AI-powered GIS Workspace</div>

    <div class="steps">
      <div class="step pending" id="step-init">
        <span class="step-icon"></span>
        <span class="step-label">Initializing application</span>
      </div>
      <div class="step pending" id="step-window">
        <span class="step-icon"></span>
        <span class="step-label">Preparing workspace</span>
      </div>
      <div class="step pending" id="step-python">
        <span class="step-icon"></span>
        <span class="step-label">Starting Python backend</span>
      </div>
      <div class="step pending" id="step-ready">
        <span class="step-icon"></span>
        <span class="step-label">Ready</span>
      </div>
    </div>

    <div class="progress-wrapper">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="status-text" id="statusText"></div>
  </div>

  <div class="footer">v4.0 - Powered by LiteLLM</div>

  <script>
    const { ipcRenderer } = require('electron')

    // ─── Theme handling ───
    ipcRenderer.on('loading:theme', (event, theme) => {
      if (theme === 'dark') {
        document.body.classList.add('dark')
      } else {
        document.body.classList.remove('dark')
      }
    })

    // ─── Progress logic ───
    const steps = ['step-init', 'step-window', 'step-python', 'step-ready']
    const progressFill = document.getElementById('progressFill')
    const statusText = document.getElementById('statusText')

    const _buf = []
    let _ready = false

    function updateStep(doneCount, currentStep, statusMsg) {
      doneCount = Math.max(0, Math.min(doneCount, steps.length))
      steps.forEach((id, i) => {
        const el = document.getElementById(id)
        let state = 'pending'
        if (i < doneCount) {
          state = 'done'
        } else if (i === doneCount && currentStep) {
          state = 'active'
        } else if (i === doneCount && !currentStep) {
          state = 'done'
        }
        el.className = 'step ' + state
      })

      const pct = Math.round(((doneCount + (currentStep ? 0.5 : 0)) / steps.length) * 100)
      progressFill.style.width = Math.max(pct, (doneCount / steps.length) * 100) + '%'

      if (statusMsg) statusText.textContent = statusMsg
      _ready = true
      while (_buf.length) {
        const d = _buf.shift()
        _applyProgress(d)
      }
    }

    function _applyProgress(data) {
      if (data.step !== undefined) updateStep(data.step, true, data.status)
      if (data.done !== undefined) updateStep(data.done, false, data.status)
      if (data.status === 'Ready!') {
        updateStep(steps.length, false, data.status)
      } else if (data.status && data.step === undefined && data.done === undefined) {
        statusText.textContent = data.status
      }
    }

    ipcRenderer.on('loading:progress', (event, data) => {
      if (!_ready) { _buf.push(data); return }
      _applyProgress(data)
    })

    // Initial state
    updateStep(0, true, 'Initializing...')
  </script>
</body>
</html>
